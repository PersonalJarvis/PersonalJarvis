# Scoped Ruff config for the v2 prototype (mirrors the repo rule selection).
# The core `optimistic/` modules stay clean under these rules. The relaxations
# below cover demo scripts and SSE/async test helpers, where broad cleanup
# swallows (S110) and a timeout= parameter on a test helper (ASYNC109) are
# deliberate, and a few print/argparse lines run long (E501).
line-length = 110

[lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "S", "A"]
ignore = ["S101", "S603", "S607"]

[lint.per-file-ignores]
"demo_client.py" = ["S110", "E501"]
"verify_live.py" = ["S110", "E501"]
"tests/proto_testkit.py" = ["S110", "ASYNC109"]
"tests/test_sse.py" = ["S110", "ASYNC109"]
