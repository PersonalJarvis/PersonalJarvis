version: 1
language: en
content_root: docs/product
page_count: 43
navigation_principle: reader-journey
authoring_contract:
  audience: People using Personal Jarvis, including readers with no software background.
  style: Lead with the outcome, explain one idea at a time, and prefer short examples and diagrams over large code blocks.
  safety: Use placeholders for credentials, account identifiers, paths, phone numbers, and personal data. Never copy local secrets or PII into documentation.
  connections: Every page must explain how its feature connects to the related features named in this manifest.
generated_reference_policy:
  policy: link-only
  description: Generated references remain generated. Reader pages may introduce and link to them, but must not copy or hand-maintain their contents.
  paths:
    - docs/commands-reference.md
    - docs/jarvis-cli-reference.md

