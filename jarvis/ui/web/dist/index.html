<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="256x256" href="/jarvis-gigi-256.png" />
    <link rel="icon" type="image/x-icon" href="/jarvis-gigi.ico" />
    <!-- Neutral, trademark-free fallback title. The inline boot script below
         overwrites it with the user's own assistant name (from the localStorage
         cache) the instant the window opens, so a trademarked placeholder is
         never shown. -->
    <title>Assistant</title>
    <style>
      /* Boot splash — painted from index.html the instant the window opens, so
         there is NO black screen while the (large) JS bundle loads + React
         mounts. React's createRoot clears #root on its first render, so this is
         replaced by the real UI automatically. Background matches the pywebview
         window color (#0a0e14) so there is never a flash. */
      html, body { margin: 0; height: 100%; background: #0a0e14; }
      #jarvis-boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: #0a0e14;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: #e7c46e;
      }
      #jarvis-boot-splash .ring {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid rgba(231, 196, 110, 0.2);
        border-top-color: #e7c46e;
        animation: jbs-spin 0.8s linear infinite;
      }
      #jarvis-boot-splash .name {
        font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
        color: #e6e6e6;
      }
      #jarvis-boot-splash .sub {
        font-size: 12px; color: #9aa3ad; letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      @keyframes jbs-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/assets/index-CRQPRm6o.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DpL5O6pZ.css">
  </head>
  <body>
    <div id="root">
      <div id="jarvis-boot-splash">
        <div class="ring"></div>
        <!-- Painted synchronously by the inline script below from the cached
             assistant name (the user's chosen wake word, e.g. "Nico"). Left
             empty in static HTML so the very first run — before any name is
             cached — shows only the spinner, never a hardcoded / trademarked
             name. -->
        <div class="name"></div>
        <div class="sub">Starting…</div>
      </div>
    </div>
    <script>
      // Paint the user's own assistant name (derived from their wake word) into
      // the boot splash + window title the instant the window opens. The name is
      // read SYNCHRONOUSLY from localStorage — no network, no await — so this
      // adds effectively zero startup latency. The cache is written by the app
      // after each name resolve (see src/lib/assistantNameCache.ts; keep this
      // storage key in lockstep). On the very first run the cache is empty and
      // the splash keeps just its spinner. A trademarked placeholder such as
      // "Jarvis" is never painted here.
      (function () {
        try {
          var name = (localStorage.getItem("jarvis.assistantName") || "").trim();
          if (name) {
            var el = document.querySelector("#jarvis-boot-splash .name");
            if (el) el.textContent = name;
            document.title = name;
          }
        } catch (e) {
          /* storage blocked (private mode) — keep the neutral fallback */
        }
      })();
    </script>
    <script>
      // Do not release the desktop's heavy backend warm-up merely because the
      // HTML or entry bundle was sent. A cold WebView can receive those bytes
      // before its browser main thread paints anything. Two animation frames
      // prove that the user has seen this dependency-free boot shell first.
      (function () {
        var acknowledgePaint = function () {
          fetch("/api/ui/shell-painted", {
            method: "POST",
            cache: "no-store",
          }).catch(function () {
            /* The full app may already own the route; startup remains bounded. */
          });
        };
        requestAnimationFrame(function () {
          requestAnimationFrame(acknowledgePaint);
        });
      })();
    </script>
  </body>
</html>
