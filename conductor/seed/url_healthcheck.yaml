# Demo job 1 — HTTP healthcheck every 5 minutes.
# This YAML is exactly the Pydantic job model.
id: 7b4d7e01-5c11-4c57-9c1d-10cc00000001
name: GitHub-API Zen
description: >
  Pings github.com/zen every 5 minutes and checks for 2xx. A minimal
  live demo job; shows what HTTP monitoring looks like.
enabled: true
tags: [demo, monitor, http]
spec:
  type: http
  method: GET
  url: https://api.github.com/zen
  expect_status: 2xx
  timeout_s: 10.0
schedule:
  type: interval
  seconds: 300
