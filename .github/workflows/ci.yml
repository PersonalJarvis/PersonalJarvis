# Functional CI matrix (Wave 0, sub-task 0.3 - AD-4, discharges PC-1).
#
# Before this file the repo had NO functional CI: .github/workflows/ held only
# supply-chain workflows, none ran pytest/ruff/mypy. This is the cross-platform
# migration's load-bearing safety net - it is the only place the Windows-only
# maintainer sees a red check when macOS/Linux code breaks.
#
# Gating policy (deliberate, see docs/plans/cross-platform-mac-linux/WELLE-0):
#   * ruff / ruff format / mypy  -> REPORT-ONLY (continue-on-error). The repo
#     carries a large pre-existing lint/type backlog (636 ruff findings at
#     Wave 0); making them blocking would be red-from-day-one for reasons
#     unrelated to this migration. Clean them in a separate effort, then flip
#     continue-on-error off.
#   * import-cleanliness gate    -> BLOCKING. Proves `import jarvis` is clean on
#     Linux/macOS (no module-scope pywin32/winreg/global_hotkeys) - the €5-VPS
#     contract. A regression here breaks Mac/Linux outright.
#   * min-passed floor           -> BLOCKING. Catches a mass-skip / broken-
#     collection regression that would otherwise sail through as green.
#   * pytest failures            -> reported (the floor script warns; pass
#     --strict once the suite is fully green to make them blocking).
#
# Cost policy (added 2026-06-23): macOS runners bill at ~10x the Linux rate, so
# the macOS leg is OFF for ordinary push/PR runs and ON only for a manual
# workflow_dispatch (the `include_macos` input, default true). Linux + Windows
# run on every push/PR and catch almost all cross-platform regressions. A
# `concurrency` group cancels a superseded in-flight run so a burst of commits
# can't stack billable minutes. To prove macOS on demand: the Actions tab ->
# "Run workflow", or `gh workflow run ci.yml`. The `configure` job is the single
# source of truth for which OS legs run (consumed by both `test` and `jarvisctl`).
#
# Action SHAs are pinned to 40-char commits already vetted elsewhere in this
# repo's workflows (CVE-2025-30066 hardening).

name: CI

on:
  push:
    branches:
      - main
      - "wip/cross-platform-cloud-first-20260529"
  pull_request:
  workflow_dispatch:
    inputs:
      include_macos:
        description: "Also run the macOS leg (~10x runner cost). On by default for a manual run, since proving macOS is usually the point of dispatching by hand."
        type: boolean
        default: true

# Cost control: a new push to the same ref cancels the previous in-flight run,
# so a burst of commits doesn't stack up billable runner minutes. Keyed on ref
# so different branches never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Single source of truth for which OS legs run. macOS bills at ~10x the Linux
  # rate, so it is included ONLY for a manual workflow_dispatch with include_macos
  # (default true). Every ordinary push/PR runs the cheap Linux + Windows legs,
  # which catch almost all cross-platform regressions. Both `test` and `jarvisctl`
  # consume this output so the policy lives in exactly one place.
  configure:
    name: configure matrix (cost-aware)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      os-matrix: ${{ steps.pick.outputs.os-matrix }}
    steps:
      - name: Pick OS matrix
        id: pick
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_macos }}" = "true" ]; then
            echo 'os-matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
            echo "macOS leg INCLUDED (manual dispatch)."
          else
            echo 'os-matrix=["ubuntu-latest","windows-latest"]' >> "$GITHUB_OUTPUT"
            echo "macOS leg SKIPPED (cheap push/PR run). Dispatch manually to include it."
          fi

  test:
    name: test (${{ matrix.os }})
    needs: configure
    strategy:
      fail-fast: false # we want to see ALL OS legs, not just the first red one
      matrix:
        os: ${{ fromJSON(needs.configure.outputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install base + dev (NO platform extras - proves the VPS/base install)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: ruff lint (report-only)
        continue-on-error: true
        run: python -m ruff check jarvis/

      - name: ruff format check (report-only)
        continue-on-error: true
        run: python -m ruff format --check jarvis/

      - name: mypy (report-only)
        continue-on-error: true
        run: python -m mypy jarvis/

      - name: Import-cleanliness gate (BLOCKING — runs on the bare .[dev] install)
        run: python scripts/ci/check_import_clean.py

      # The import gate above PROVES the €5-VPS base install imports clean (no
      # Windows APIs, no system libs). Only AFTER that proof do we install the
      # system libraries + test-only packages the *test suite* needs to RUN — these
      # are NOT part of the base-install contract. libportaudio2 backs sounddevice
      # (a base dep that lazy-imports PortAudio); hypothesis + twilio are imported
      # by some test modules that lack an importorskip guard (pre-existing).
      - name: System + test-only deps (to run the suite, not part of the base proof)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libportaudio2
          fi
          python -m pip install hypothesis
          python -m pip install -e ".[telephony]"

      - name: pytest (JUnit XML)
        shell: bash
        run: |
          python -m pytest tests/ -q -p no:cacheprovider \
            -m "not skip_ci and not slow and not openclaw_live and not voice_latency and not eval" \
            --continue-on-collection-errors \
            --junitxml=report.xml || echo "pytest exited non-zero (pre-existing failures/collection-errors are reported by the floor gate)"

      - name: Minimum-passed floor (BLOCKING, Linux leg is authoritative)
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/ci/assert_min_passed.py report.xml

  # jarvisctl control-CLI unit suite across the three supported desktops.
  # jarvisctl is a thin cross-platform HTTP client (paths via platformdirs,
  # UTF-8 I/O, no Windows APIs); this job proves it imports + its unit tests
  # pass identically on Linux, macOS, and Windows. Own job (separate from the
  # main `test` matrix) so a CLI-only change gets a fast, isolated signal and
  # the suite can install just the CLI's runtime deps. fail-fast: false to see
  # all three OS legs.
  jarvisctl:
    name: jarvisctl unit (${{ matrix.os }})
    needs: configure
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.configure.outputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install package (no deps) + CLI runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" --no-deps
          # pytest is needed to RUN the suite; --no-deps above skips it (and all
          # of [dev]'s deps), so install the test runner explicitly alongside the
          # CLI's own runtime deps AND the light libs the cli_ctl test modules pull
          # in transitively (pyyaml/pydantic/loguru/dotenv/packaging, via
          # dispatch / self-control-catalog / discovery importing deeper jarvis
          # modules). Still light — no torch/audio/GUI/desktop deps.
          python -m pip install typer platformdirs click httpx rich pytest pytest-asyncio pyyaml pydantic loguru python-dotenv packaging

      - name: Import + --help smoke (CLI runs without desktop deps)
        # python:3.11-slim-equivalent: `--no-deps` above skipped torch / sounddevice
        # / etc., so this proves jarvis.cli_ctl imports and its --help renders on a
        # bare Linux/macOS/Windows with only typer/httpx/platformdirs/rich. No live
        # server here: the dynamic `api` build fails closed to the curated surface.
        run: |
          python -c "import jarvis.cli_ctl.__main__"
          python -m jarvis.cli_ctl --help

      - name: CLI coverage gate (every route mounted + tagged)
        # Static + stdlib-only: every jarvis/ui/web/*_routes.py router must be
        # mounted in server.py and carry tags=, so every WebUI action stays a
        # reachable, cleanly-grouped `jarvis api <tag>` command. Mirrors the
        # pre-push hook so a contributor without the hook can't bypass it.
        run: python scripts/ci/check_cli_coverage.py

      - name: Danger-metadata gate (destructive routes declare x-jarvis-dangerous)
        # Static + stdlib-only: a mutating route whose path matches a
        # destructive marker must carry openapi_extra x-jarvis-dangerous so the
        # CLI dynamic layer + Command Registry gate it. Mirrors pre-push.
        run: python scripts/ci/check_danger_metadata.py

      - name: CLI reference drift gate (docs in sync with command tree)
        # Fails if a curated command was added/changed without regenerating
        # docs/jarvis-cli-reference.md. Mirrors the pre-push docgen gate.
        run: python scripts/ci/gen_cli_reference.py --check

      - name: Commands reference drift gate (docs in sync with the registry)
        # Fails if a Command-Registry entry was added/changed without
        # regenerating docs/commands-reference.md. Mirrors the pre-push gate.
        run: python scripts/ci/gen_commands_reference.py --check

      - name: Install base runtime deps for the test suite (robust; no hand-list)
        shell: bash
        # The cli_ctl unit tests import deeper jarvis modules that transitively
        # pull in base runtime deps (pydantic, pyyaml, loguru, …). Install the
        # package's BASE deps — torch-/GPU-free per the cloud-first base-install
        # mandate — instead of the hand-maintained dep list above, which silently
        # rots and REDS CI the moment a test imports one more transitive lib (the
        # recurring "ModuleNotFoundError: No module named 'yaml'/'pydantic'"
        # collection errors). The heavy desktop/voice extras stay OUT, so the
        # --help smoke above still proves the light install path.
        run: |
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio hypothesis

      - name: pytest (jarvisctl unit suite)
        run: python -m pytest tests/unit/cli_ctl/ -v

  # Dependency-manifest sync gate (BLOCKING). requirements.in (the source for the
  # hash-pinned requirements.txt lockfile) must mirror pyproject.toml
  # [project].dependencies exactly. When they drift, an extras-only, torch-pulling
  # package (silero-vad, sentence-transformers, …) leaks into the base lockfile,
  # baking the multi-GB, GPU-specific CUDA wheel stack into the installer and
  # bricking `pip install --require-hashes -r requirements.txt` for every
  # non-maintainer machine (nvidia-cufile is unresolvable on plain PyPI). This is
  # the guard for that shipped-broken-installer "works on my machine" bug (AP-23).
  # Runs once (not across the OS matrix); stdlib + `packaging` only.
  deps-sync:
    name: deps-sync (requirements.in mirrors pyproject)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Requirements-sync gate (BLOCKING)
        run: |
          python -m pip install --upgrade packaging
          python scripts/ci/check_requirements_sync.py

      # Companion gate: the compiled requirements.txt itself must stay
      # `--universal` and free of nvidia-*/torch/CUDA wheels, so a lockfile
      # regenerated the wrong way cannot silently re-brick non-maintainer
      # installs (AP-23). Stdlib only — no extra install needed.
      - name: Lockfile universal + GPU-free gate (BLOCKING)
        run: python scripts/ci/check_lockfile_universal.py

  # Output Language Policy enforcement (CLAUDE.md, HIGHEST PRIORITY): block any
  # NEWLY ADDED German text from reaching GitHub. Diff-based, so the in-flight
  # DE->EN translation backlog (pre-existing German) does NOT turn this red - only
  # German added by a push/PR does. Own job (runs once, not across the OS matrix);
  # stdlib + git only, so no pip install. BLOCKING.
  language-policy:
    name: language-policy (no new German)
    # PR-only: a push to main rewrites SHAs (rebase merge), which widens the
    # diff base and would re-flag pre-existing German. The protection belongs
    # on PRs, before the change reaches main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history - diff needs the merge base)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: No-new-German gate (BLOCKING)
        run: python scripts/ci/check_no_new_german.py

  # Privacy gate (Wave 2, layer 3): the non-bypassable backstop for the local
  # pre-push hook (.githooks/pre-push), which `--no-verify` can skip. Re-runs the
  # SAME secret / forbidden-file detection over the PR diff (reusing
  # scripts/ci/privacy_pre_push.py) and, when PRIVACY_PRIVATE_EMAILS is set as a
  # repo variable, the private-email identity check. Does NOT scan the real
  # name/PII (that is the ship skill's job to the public repo, and would
  # false-positive here). stdlib + git only, so no pip install. BLOCKING, PR-only.
  privacy-gate:
    name: privacy-gate (no secrets / no private identity)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history - diff needs the PR base)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Privacy gate (BLOCKING - secrets + forbidden files + identity)
        env:
          PRIVACY_PRIVATE_EMAILS: ${{ vars.PRIVACY_PRIVATE_EMAILS }}
        run: python scripts/ci/privacy_scan_ci.py --base "${{ github.event.pull_request.base.sha }}"

  # Docs privacy gate (layer-3 backstop for the .githooks/pre-push docs scan,
  # which `--no-verify` can skip). Scans the tracked docs/ tree for the
  # maintainer's real name, private email/handle, personal Windows paths, and
  # machine/account ids, using the SAME manifest the public-release scrub
  # uses (scripts/ci/privacy_gate/references/pii-scrub.tsv) so the two
  # never drift. Unlike privacy-gate above, this DOES check the real name — but
  # ONLY inside docs/, where (maintainer decision 2026-06-29) it must never
  # appear, so it cannot false-positive on code where the name lives
  # legitimately. stdlib + git only, no pip install. BLOCKING, PR-only.
  docs-privacy:
    name: docs-privacy (no personal data in docs/)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Docs privacy gate (BLOCKING - name / email / paths / ids in docs/)
        run: python scripts/ci/docs_privacy_scan.py
