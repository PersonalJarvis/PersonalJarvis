name: Frontend

on:
  push:
    branches:
      - main
      - "wip/cross-platform-cloud-first-20260529"
  pull_request:
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: test and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: jarvis/ui/web/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: jarvis/ui/web/frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build and verify production assets
        run: npm run build
