# Cross-platform drag-drop verification — proves the overlay drop mechanism
# (tkdnd load + parse + register + drop chain) actually EXECUTES on Windows,
# macOS AND Linux, by running the same
# `scripts/crossplatform/verify_drop_target.py` on each.
#
# Cost policy (2026-06-23): macOS runners bill at ~10x the Linux rate, so the
# macos-latest leg — the autonomous macOS proof that cannot be produced on a
# Windows dev box — runs ONLY on a manual `workflow_dispatch` (the Actions tab
# -> "Run workflow", or `gh workflow run dragdrop-verify.yml`). An ordinary
# push/PR that touches the drop files runs the cheap Linux + Windows legs. The
# `concurrency` group cancels a superseded in-flight run.
name: dragdrop-crossplatform-verify

on:
  push:
    paths:
      - "jarvis/overlay/drop_target.py"
      - "jarvis/overlay/drop_bridge.py"
      - "scripts/crossplatform/verify_drop_target.py"
      - ".github/workflows/dragdrop-verify.yml"
  pull_request:
    paths:
      - "jarvis/overlay/drop_target.py"
      - "jarvis/overlay/drop_bridge.py"
      - "scripts/crossplatform/verify_drop_target.py"
  workflow_dispatch: {}

# Cost control: a superseding push to the same ref cancels the in-flight run.
concurrency:
  group: dragdrop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: drag-drop (${{ matrix.os }})
    strategy:
      fail-fast: false
      # macOS (~10x cost) only on a manual dispatch; push/PR runs Linux + Windows.
      matrix:
        os: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest","windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tkinterdnd2 (+ Linux X11 runtime libs)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Pin ==0.4.2: from 0.4.4.1 onward the osx-arm64 tkdnd binary is the
          # Tcl-9 build (libtcl9tkdnd2.9.5.dylib) that fails to load on the
          # standard Tcl-8.6 Python ("incompatible stubs mechanism"). 0.4.2 is the
          # highest version whose osx-arm64 binary is the Tcl-8 build
          # (libtkdnd2.9.3.dylib), which loads on Tcl-8.6 across all three OSes.
          pip install "tkinterdnd2==0.4.2"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              python3-tk xvfb libxcursor1 libxrender1 libxext6 \
              libxft2 libxinerama1 libxi6 libxrandr2
          fi
      - name: Verify drag-drop executes on ${{ matrix.os }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a python scripts/crossplatform/verify_drop_target.py
          else
            python scripts/crossplatform/verify_drop_target.py
          fi
