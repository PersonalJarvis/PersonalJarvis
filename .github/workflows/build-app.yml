name: Build App

# Builds the native, double-click desktop app for all three OSes on real
# runners: Windows (Inno Setup .exe), macOS (.dmg), Linux (AppImage).
#
# Triggers:
#   - manual (workflow_dispatch) — build installers on demand
#   - tag push matching app-v* — build + attach to the GitHub Release
#
# Honesty: these build on real OS runners, but the GUI/permission RUNTIME
# behaviour on macOS/Linux is not yet signed off on real desktop hardware — see
# docs/plans/cross-platform-mac-linux/SIGNOFF-LOG.md. Native packaging of an app
# that spawns subprocess workers is fiddly; expect the first runs to need fixes.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string baked into installer filenames"
        required: false
        default: "0.1.0-dev"
  push:
    tags:
      - "app-v*"

permissions:
  contents: write   # needed to attach artifacts to a Release on tag builds

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#app-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # The full app (torch + PySide6 + whisper) plus the PyInstaller bundle
          # plus the AppImage AppDir copy overflow the ~14 GB ubuntu runner. Drop
          # the preinstalled SDKs we don't need (~25 GB) before installing.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /usr/local/lib/node_modules 2>/dev/null || true
          sudo apt-get clean || true
          df -h /

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pin CPU-only torch (slim bundle — no CUDA)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          # The default Linux/Windows torch wheel bundles the full CUDA stack
          # (nvidia-* ~2 GB) which bloats the AppImage to ~2.8 GB. The shipped
          # app runs local Whisper on CPU (or falls back to cloud STT), so the
          # CUDA libs are dead weight. Install the CPU-only build FIRST so the
          # subsequent ".[full]" resolve sees torch satisfied and keeps it.
          python -m pip install --upgrade pip
          python -m pip install torch torchaudio \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python deps (full app + companion packages + PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -e ".[full]"
          python -m pip install -e ./board-backend -e ./OS-Level -e ./skillbook
          python -m pip install pyinstaller

      - name: Build frontend
        shell: bash
        working-directory: jarvis/ui/web/frontend
        run: |
          npm ci
          npm run build

      - name: Generate macOS icon (.icns)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sips -s format icns assets/icons/jarvis-gigi-256.png \
            --out assets/icons/jarvis.icns

      - name: Seed default jarvis.toml
        shell: bash
        run: |
          # A fresh checkout has only jarvis.toml.example (the real one is
          # gitignored / wizard-generated). Seed it so the bundle ships a default.
          [ -f jarvis.toml ] || cp jarvis.toml.example jarvis.toml

      - name: PyInstaller bundle
        shell: bash
        run: python -m PyInstaller jarvis.spec --noconfirm --clean

      # ---- per-OS native installer ------------------------------------------
      - name: Package Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            packaging\windows\jarvis.iss

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x build.sh packaging/linux/build-appimage.sh packaging/linux/AppRun
          packaging/linux/build-appimage.sh "${{ steps.ver.outputs.version }}"

      # ---- collect + publish -------------------------------------------------
      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p out
          # Windows Inno output, macOS dmg, Linux AppImage all land predictably.
          cp packaging/windows/Output/*.exe out/ 2>/dev/null || true
          cp dist/*.dmg out/ 2>/dev/null || true
          cp dist/*.AppImage out/ 2>/dev/null || true
          ls -la out/

      - uses: actions/upload-artifact@v7
        with:
          name: personal-jarvis-${{ matrix.label }}
          path: out/*
          if-no-files-found: warn

      - name: Attach to Release (tag builds only)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
