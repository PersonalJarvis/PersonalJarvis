\r
### Block 3 — Backup directory\r
- AP-SM13 Out-of-watchdog: <PASS|FAIL>\r
\r
### Block 4 — Tool definition\r
- AP-SM7 Jarvis-Agent spawn via Mission-Manager: <PASS|FAIL>\r
