\r
### Block 6 — Skill authoring\r
- AP-SM6 state=draft: <PASS|FAIL>\r
- AP-SM10 user_skills_dir: <PASS|FAIL>\r
- draft_writer forcing: <PASS|FAIL>\r
\r
### Block 7 — Voice/chat discipline\r
- AP-SM2 Keys not via voice: <PASS|FAIL>\r
\r
### Block 8 — System prompt\r
- AP-SM1 Constraint-code enforcement: <PASS|FAIL>\r
\r
### Block 9 — Success criteria (if E2E tests included)\r
- EK-1, EK-2, EK-3, EK-4: <PASS|FAIL|N/A>\r
\r
### BLOCKER (n)\r
...\r
\r
### MAJOR (n)\r
...\r
\r
