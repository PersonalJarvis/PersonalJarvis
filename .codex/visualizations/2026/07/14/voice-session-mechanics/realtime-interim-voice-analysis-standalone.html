      const ns = &#x27;http://www.w3.org/2000/svg&#x27;;
      const q = (selector) =&gt; root.querySelector(selector);
      const fmt = (value) =&gt; value == null ? &#x27;—&#x27; : `+${value.toFixed(2)} s`;

      function svgEl(name, attrs = {}, text = &#x27;&#x27;) {
        const el = document.createElementNS(ns, name);
        Object.entries(attrs).forEach(([key, value]) =&gt; el.setAttribute(key, String(value)));
        if (text) el.textContent = text;
        return el;
      }

      function addNode(group, x, y, label, time, variant = &#x27;&#x27;) {
        const width = Math.max(116, Math.min(184, label.length * 7.1 + 24));
        const node = svgEl(&#x27;g&#x27;, { class: `node ${variant}`.trim(), transform: `translate(${x - width / 2} ${y - 25})` });
        node.appendChild(svgEl(&#x27;rect&#x27;, { width, height: 50, rx: 8 }));
        node.appendChild(svgEl(&#x27;text&#x27;, { x: width / 2, y: 21, &#x27;text-anchor&#x27;: &#x27;middle&#x27; }, label));
        node.appendChild(svgEl(&#x27;text&#x27;, { class: &#x27;node-time&#x27;, x: width / 2, y: 38, &#x27;text-anchor&#x27;: &#x27;middle&#x27; }, fmt(time)));
        group.appendChild(node);
        return { x, y, width };
      }

      function addEdge(group, from, to, variant = &#x27;&#x27;) {
        const startX = from.x + Math.min(from.width / 2, Math.max(20, (to.x - from.x) * 0.22));
        const endX = to.x - Math.min(to.width / 2, Math.max(20, (to.x - from.x) * 0.22));
        const midX = (startX + endX) / 2;
        const marker = variant === &#x27;branch&#x27; ? &#x27;url(#branch-arrow)&#x27; : &#x27;url(#flow-arrow)&#x27;;
        group.appendChild(svgEl(&#x27;path&#x27;, {
          class: `flow-edge ${variant}`.trim(),
          d: `M ${startX} ${from.y} C ${midX} ${from.y}, ${midX} ${to.y}, ${endX} ${to.y}`,
          &#x27;marker-end&#x27;: marker
        }));
      }

      function renderDiagram(turn) {
        const grid = q(&#x27;#diagram-grid&#x27;);
        const edges = q(&#x27;#diagram-edges&#x27;);
        const bands = q(&#x27;#diagram-bands&#x27;);
        const nodes = q(&#x27;#diagram-nodes&#x27;);
        [grid, edges, bands, nodes].forEach((group) =&gt; group.replaceChildren());

        const left = 150;
        const right = 950;
        const domain = Math.max(10, Math.ceil(turn.finalAudio + 0.6));
        const x = (time) =&gt; left + (Math.max(0, time) / domain) * (right - left);
        const laneY = { route: 72, work: 176, voice: 280 };

        [&#x27;User + route&#x27;, &#x27;Router + tools&#x27;, &#x27;Realtime voice&#x27;].forEach((label, index) =&gt; {
          const y = [laneY.route, laneY.work, laneY.voice][index];
          grid.appendChild(svgEl(&#x27;text&#x27;, { class: &#x27;lane-label&#x27;, x: 12, y: y + 4 }, label));
          grid.appendChild(svgEl(&#x27;line&#x27;, { class: &#x27;lane-line&#x27;, x1: left, y1: y, x2: right, y2: y }));
        });
        grid.appendChild(svgEl(&#x27;line&#x27;, { class: &#x27;axis-line&#x27;, x1: left, y1: 342, x2: right, y2: 342 }));
        for (let tick = 0; tick &lt;= domain; tick += 2) {
          const tx = x(tick);
          grid.appendChild(svgEl(&#x27;line&#x27;, { class: &#x27;tick-line&#x27;, x1: tx, y1: 48, x2: tx, y2: 342 }));
          grid.appendChild(svgEl(&#x27;text&#x27;, { class: &#x27;axis-text&#x27;, x: tx, y: 362, &#x27;text-anchor&#x27;: &#x27;middle&#x27; }, `+${tick}s`));
        }

        const input = addNode(nodes, x(0), laneY.route, &#x27;Input committed&#x27;, 0, &#x27;primary&#x27;);
        const route = addNode(nodes, x(Math.min(0.55, turn.finalAudio * 0.18)), laneY.route, turn.route.includes(&#x27;Native&#x27;) ? &#x27;Native route&#x27; : &#x27;Route decision&#x27;, Math.min(0.55, turn.finalAudio * 0.18));
        addEdge(edges, input, route);

        let tool = null;
        let toolDone = null;
        let ready = null;
        if (turn.toolSelected != null) {
          tool = addNode(nodes, x(turn.toolSelected), laneY.work, &#x27;Search selected&#x27;, turn.toolSelected);
          addEdge(edges, route, tool);
        }
        if (turn.toolDone != null) {
          toolDone = addNode(nodes, x(turn.toolDone), laneY.work, turn.id === 8 ? &#x27;Second search done&#x27; : &#x27;Search done&#x27;, turn.toolDone);
          if (tool) addEdge(edges, tool, toolDone);
        }
        if (turn.brainReady != null) {
          ready = addNode(nodes, x(turn.brainReady), laneY.work, &#x27;Router result ready&#x27;, turn.brainReady, &#x27;primary&#x27;);
          if (toolDone) addEdge(edges, toolDone, ready);
        }

        let bridgeStart = null;
        let bridgeEnd = null;
        if (turn.bridgeAudioStart != null) {
          bridgeStart = addNode(nodes, x(turn.bridgeAudioStart), laneY.voice, &#x27;Interim starts&#x27;, turn.bridgeAudioStart, &#x27;bridge&#x27;);
          bridgeEnd = addNode(nodes, x(turn.bridgeAudioEnd), laneY.voice, &#x27;Interim ends&#x27;, turn.bridgeAudioEnd, &#x27;bridge&#x27;);
          addEdge(edges, route, bridgeStart, &#x27;branch&#x27;);
          addEdge(edges, bridgeStart, bridgeEnd, &#x27;branch&#x27;);
        } else if (turn.bridgeBlocked != null) {
          const bridgeAttempt = addNode(nodes, x(turn.bridgeRequested), laneY.voice, &#x27;Interim requested&#x27;, turn.bridgeRequested, &#x27;bridge&#x27;);
          const blocked = addNode(nodes, x(turn.bridgeBlocked), laneY.voice, &#x27;Honesty scrub blocks it&#x27;, turn.bridgeBlocked, &#x27;blocked&#x27;);
          addEdge(edges, route, bridgeAttempt, &#x27;branch&#x27;);
          addEdge(edges, bridgeAttempt, blocked, &#x27;blocked&#x27;);
        }

        if (turn.groundedAck != null) {
          const ack = addNode(nodes, x(turn.groundedAck), laneY.route, &#x27;Parallel grounded ack&#x27;, turn.groundedAck);
          addEdge(edges, route, ack);
          if (turn.groundedAckDropped != null) {
            const dropped = addNode(nodes, x(turn.groundedAckDropped), laneY.route, &#x27;Ack dropped&#x27;, turn.groundedAckDropped, &#x27;blocked&#x27;);
            addEdge(edges, ack, dropped, &#x27;blocked&#x27;);
          }
        }

        const final = addNode(nodes, x(turn.finalAudio), laneY.voice, &#x27;Final answer starts&#x27;, turn.finalAudio, &#x27;primary&#x27;);
        if (ready) addEdge(edges, ready, final);
        else addEdge(edges, route, final);
        if (bridgeEnd) addEdge(edges, bridgeEnd, final, &#x27;branch&#x27;);

        if (turn.hold &gt; 0 &amp;&amp; turn.brainReady != null) {
          const start = x(turn.brainReady);
          const end = x(turn.finalAudio);
          bands.appendChild(svgEl(&#x27;rect&#x27;, {
            class: &#x27;wait-band&#x27;,
            x: start,
            y: laneY.work + 36,
            width: Math.max(2, end - start),
            height: 20,
            rx: 6
          }));
          bands.appendChild(svgEl(&#x27;text&#x27;, {
            class: &#x27;axis-text&#x27;,
            x: (start + end) / 2,
            y: laneY.work + 51,
            &#x27;text-anchor&#x27;: &#x27;middle&#x27;
          }, `result waits ${turn.hold.toFixed(2)}s`));
        }
      }

      function renderComparison(selectedId) {
        const comparison = q(&#x27;#comparison&#x27;);
        comparison.replaceChildren();
        const scale = 10;
        turns.forEach((turn) =&gt; {
          const row = document.createElement(&#x27;div&#x27;);
          row.className = `compare-row${turn.id === selectedId ? &#x27; is-selected&#x27; : &#x27;&#x27;}`;
          const label = document.createElement(&#x27;div&#x27;);
          label.className = &#x27;compare-label&#x27;;
          label.innerHTML = `&lt;span&gt;Turn ${turn.id}&lt;/span&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;${turn.route.includes(&#x27;Native&#x27;) ? &#x27;native&#x27; : turn.route.includes(&#x27;Provider&#x27;) ? &#x27;tool-requested&#x27; : &#x27;deterministic&#x27;}&lt;/span&gt;`;
          const bar = document.createElement(&#x27;div&#x27;);
          bar.className = &#x27;bar&#x27;;
          bar.setAttribute(&#x27;aria-label&#x27;, `Turn ${turn.id}: final speech starts at ${turn.finalAudio.toFixed(2)} seconds`);
          const thinking = document.createElement(&#x27;span&#x27;);
          thinking.className = &#x27;thinking-segment&#x27;;
          thinking.style.width = `${Math.min(100, turn.finalAudio / scale * 100)}%`;
          bar.appendChild(thinking);
          if (turn.bridgeAudioStart != null) {
            const bridge = document.createElement(&#x27;span&#x27;);
            bridge.className = &#x27;bridge-segment&#x27;;
            bridge.style.left = `${turn.bridgeAudioStart / scale * 100}%`;
            bridge.style.width = `${(turn.bridgeAudioEnd - turn.bridgeAudioStart) / scale * 100}%`;
            bar.appendChild(bridge);
          }
          if (turn.brainReady != null) {
            const ready = document.createElement(&#x27;span&#x27;);
            ready.className = &#x27;ready-marker&#x27;;
            ready.style.left = `${turn.brainReady / scale * 100}%`;
            bar.appendChild(ready);
          }
          const final = document.createElement(&#x27;span&#x27;);
          final.className = &#x27;final-marker&#x27;;
          final.style.left = `${turn.finalAudio / scale * 100}%`;
          bar.appendChild(final);
          const note = document.createElement(&#x27;div&#x27;);
          note.className = &#x27;compare-note text-small&#x27;;
          note.textContent = turn.compare;
          row.append(label, bar, note);
          comparison.appendChild(row);
        });
      }

      function selectTurn(id) {
        const turn = turns.find((item) =&gt; item.id === id) || turns[2];
        root.querySelectorAll(&#x27;[data-turn]&#x27;).forEach((button) =&gt; {
          const selected = Number(button.dataset.turn) === turn.id;
          button.classList.toggle(&#x27;btn-primary&#x27;, selected);
          button.setAttribute(&#x27;aria-pressed&#x27;, selected ? &#x27;true&#x27; : &#x27;false&#x27;);
        });
        q(&#x27;#route-badge&#x27;).textContent = `${turn.route} · ${turn.routeReason}`;
        q(&#x27;#question&#x27;).textContent = turn.question;
        q(&#x27;#ready-value&#x27;).textContent = fmt(turn.brainReady);
        q(&#x27;#ready-context&#x27;).textContent = turn.brainReady == null ? &#x27;No delegated router result&#x27; : &#x27;Delegated result completion&#x27;;
        q(&#x27;#final-value&#x27;).textContent = fmt(turn.finalAudio);
        q(&#x27;#final-context&#x27;).textContent = `Turn completes at ${fmt(turn.turnDone)}`;
        q(&#x27;#hold-value&#x27;).textContent = turn.hold &gt; 0 ? `${turn.hold.toFixed(2)} s` : &#x27;0 s&#x27;;
        q(&#x27;#hold-context&#x27;).textContent = turn.hold &gt; 0 ? &#x27;Result ready before interim response ended&#x27; : &#x27;No audible interim blocked final delivery&#x27;;
        q(&#x27;#selected-detail&#x27;).textContent = turn.note;
        renderDiagram(turn);
        renderComparison(turn.id);
      }

      root.querySelectorAll(&#x27;[data-turn]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; selectTurn(Number(button.dataset.turn)));
      });
      selectTurn(3);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
