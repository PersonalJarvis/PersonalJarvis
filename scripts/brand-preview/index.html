<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <title>Personal Jarvis — brand preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <style>
      :root { --yellow:#ffd60a; --black:#0a0a0a; --ink:#f4f4f5; --muted:#8f8f8f; --card:#0f0f0f; --border:#242424; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body { background:var(--black); color:var(--ink); font-family:"Space Grotesk",system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:42px; padding:60px 24px; }
      h1 { font-size:34px; letter-spacing:-1px; font-weight:700; }
      h1 .y { color:var(--yellow); }
      p.sub { color:var(--muted); font-family:"JetBrains Mono",monospace; letter-spacing:3px; text-transform:uppercase; font-size:13px; }
      .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
      a.card { width:320px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; text-decoration:none; color:var(--ink); transition:.15s; display:block; }
      a.card:hover { border-color:rgba(255,214,10,.5); transform:translateY(-3px); }
      a.card h2 { font-size:20px; margin-bottom:8px; }
      a.card .arrow { color:var(--yellow); }
      a.card p { color:var(--muted); font-size:14px; line-height:1.5; }
    </style>
  </head>
  <body>
    <div style="text-align:center">
      <h1>Personal <span class="y">Jarvis</span> — brand preview</h1>
      <p class="sub">prototype · review · iterate</p>
    </div>
    <div class="cards">
      <a class="card" href="/scripts/brand-preview/readme.html">
        <h2>README preview <span class="arrow">→</span></h2>
        <p>The new front-door README rendered GitHub-style (dark), with the hero banner and live image paths.</p>
      </a>
      <a class="card" href="/scripts/brand-preview/hero.html">
        <h2>Hero banner <span class="arrow">→</span></h2>
        <p>The glitch wordmark variants on matte black — self-built now, AI variant slot pending.</p>
      </a>
    </div>
  </body>
</html>
