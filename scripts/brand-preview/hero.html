<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <title>Hero banner — Personal Jarvis</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <style>
      :root { --yellow:#ffd60a; --black:#0a0a0a; --ink:#f4f4f5; --muted:#8f8f8f; --card:#0f0f0f; --border:#242424; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body { background:var(--black); color:var(--ink); font-family:"Space Grotesk",system-ui,sans-serif; padding:56px 24px 100px; }
      .wrap { max-width:960px; margin:0 auto; }
      a.back { color:var(--muted); text-decoration:none; font-family:"JetBrains Mono",monospace; font-size:13px; letter-spacing:2px; }
      a.back:hover { color:var(--yellow); }
      h1 { font-size:30px; margin:18px 0 6px; letter-spacing:-1px; }
      h1 .y { color:var(--yellow); }
      .lead { color:var(--muted); margin-bottom:40px; font-size:15px; }
      .variant { margin-bottom:48px; }
      .label { font-family:"JetBrains Mono",monospace; font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--yellow); margin-bottom:14px; }
      .label .note { color:var(--muted); }
      .frame { background:var(--black); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
      .frame img { display:block; width:100%; height:auto; }
      .frame.live { aspect-ratio: 1280 / 480; }
      .frame.live iframe { width:1280px; height:480px; border:0; transform-origin:top left; }
      .placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; min-height:300px; border:1px dashed var(--border); border-radius:14px; color:var(--muted); text-align:center; padding:30px; }
      .placeholder b { color:var(--ink); font-size:18px; }
      .scaler { position:relative; width:100%; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="/scripts/brand-preview/index.html">← back</a>
      <h1>Hero banner — <span class="y">final</span></h1>
      <p class="lead">The chosen banner, wired into the README hero.</p>

      <div class="variant">
        <div class="label">Live hero <span class="note">— AI-generated metallic-gold wordmark (assets/brand/banner.png)</span></div>
        <div class="frame"><img src="assets/brand/banner.png" alt="Personal Jarvis banner" /></div>
      </div>

      <div class="variant">
        <div class="label">CSS fallback <span class="note">— reproducible pure-CSS treatment (banner.html → banner-css.png)</span></div>
        <div class="frame live"><div class="scaler"><iframe src="assets/brand/banner.html" scrolling="no"></iframe></div></div>
      </div>
    </div>
    <script>
      // Scale the 1280px live iframe to fit the column width.
      function fit() {
        document.querySelectorAll(".frame.live").forEach((f) => {
          const s = f.querySelector(".scaler"), ifr = f.querySelector("iframe");
          const k = f.clientWidth / 1280;
          ifr.style.transform = "scale(" + k + ")";
          s.style.height = 480 * k + "px";
        });
      }
      window.addEventListener("resize", fit);
      window.addEventListener("load", fit);
      fit();
    </script>
  </body>
</html>
