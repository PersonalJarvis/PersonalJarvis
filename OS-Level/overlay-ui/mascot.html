<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src qrc:; worker-src blob:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mascot</title>
    <!-- qwebchannel.js is loaded lazily by bridge.ts. -->
  </head>
  <body>
    <!-- Rive canvas is rendered by default, fails over to <img>
         (PNG fallback) when the Rive asset doesn't load. Plan §13 + AD-16. -->
    <div class="mascot-host" role="img" aria-label="Jarvis status indicator">
      <canvas id="mascot-canvas" width="320" height="320" hidden></canvas>
      <img id="mascot-fallback" alt="" src="" hidden />
    </div>
    <script type="module" src="./src/mascot/main.ts"></script>
  </body>
</html>
