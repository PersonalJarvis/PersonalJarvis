<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src qrc:; worker-src blob:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Glow</title>
    <!--
      qwebchannel.js is provided by Qt from the qrc resource path as
      soon as the page is loaded in QWebEngineView. bridge.ts loads it
      lazily via JS — that way Vite doesn't need to resolve the URL.
    -->
  </head>
  <body>
    <!-- Edge-Glow container — main.ts buildLayers() appends 5 layer divs
         in here. CSS in edge-glow.css does the rest. -->
    <div class="edge-glow" role="presentation"></div>

    <!-- Diagnostic marker. Hidden by default via CSS display:none; visible
         with ?debug=1 in the URL. Plan §7 + Phase-9.4 spec. -->
    <div id="state-display" role="presentation">
      <span class="state">init</span>
    </div>

    <script type="module" src="./src/edge-glow/main.ts"></script>
  </body>
</html>
